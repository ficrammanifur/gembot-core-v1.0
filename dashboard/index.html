cat > templates/index.html << 'EOF'
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gembot - Smart Robot Control</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-control {
            transition: all 0.1s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-control:active {
            transform: scale(0.95);
        }
        .chat-message {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pulse {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }
        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-slate-900 text-white">
    <!-- Header -->
    <header class="bg-slate-800 border-b border-slate-700 fixed top-0 left-0 right-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
                <h1 class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                    GEMBOT
                </h1>
                <span class="text-xs text-slate-400">v2.0</span>
            </div>
            <div class="flex items-center space-x-4">
                <div id="mqtt-status" class="flex items-center space-x-2">
                    <div class="w-2 h-2 rounded-full bg-red-500"></div>
                    <span class="text-xs text-slate-400">MQTT</span>
                </div>
                <div id="ai-status" class="flex items-center space-x-2">
                    <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                    <span class="text-xs text-slate-400">AI</span>
                </div>
            </div>
        </div>
    </header>

    <div class="flex pt-16 h-screen">
        <!-- Sidebar - Controls -->
        <aside class="w-80 bg-slate-800 border-r border-slate-700 flex flex-col">
            <!-- D-Pad -->
            <div class="p-6 border-b border-slate-700">
                <h3 class="text-xs font-bold text-slate-400 uppercase mb-4">Manual Control</h3>
                <div class="grid grid-cols-3 gap-2 max-w-[200px] mx-auto">
                    <div></div>
                    <button id="btn-up" class="btn-control bg-slate-700 hover:bg-slate-600 active:bg-cyan-600 rounded-lg py-4 text-2xl">▲</button>
                    <div></div>
                    <button id="btn-left" class="btn-control bg-slate-700 hover:bg-slate-600 active:bg-cyan-600 rounded-lg py-4 text-2xl">◀</button>
                    <button id="btn-stop" class="btn-control bg-red-600 hover:bg-red-700 active:bg-red-800 rounded-lg py-4 text-xl font-bold">STOP</button>
                    <button id="btn-right" class="btn-control bg-slate-700 hover:bg-slate-600 active:bg-cyan-600 rounded-lg py-4 text-2xl">▶</button>
                    <div></div>
                    <button id="btn-down" class="btn-control bg-slate-700 hover:bg-slate-600 active:bg-cyan-600 rounded-lg py-4 text-2xl">▼</button>
                    <div></div>
                </div>
            </div>

            <!-- Sensor Data -->
            <div class="p-6 border-b border-slate-700">
                <h3 class="text-xs font-bold text-slate-400 uppercase mb-4">Sensor Data</h3>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between">
                        <span class="text-slate-400">Command:</span>
                        <span id="sensor-cmd" class="font-mono text-cyan-400">STOP</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-slate-400">Speed:</span>
                        <span id="sensor-speed" class="font-mono">0.00 km/h</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-slate-400">Satellites:</span>
                        <span id="sensor-sat" class="font-mono">0</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-slate-400">Latitude:</span>
                        <span id="sensor-lat" class="font-mono text-xs">-</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-slate-400">Longitude:</span>
                        <span id="sensor-lng" class="font-mono text-xs">-</span>
                    </div>
                </div>
            </div>

            <!-- Chat Input -->
            <div class="flex-1 p-6 flex flex-col">
                <h3 class="text-xs font-bold text-slate-400 uppercase mb-4">AI Chat</h3>
                <div id="chat-messages" class="flex-1 overflow-y-auto mb-4 space-y-2 text-sm" style="max-height: 300px;">
                    <div class="text-slate-500 text-center text-xs">Gembot siap membantu</div>
                </div>
                <div class="flex space-x-2">
                    <input type="text" id="chat-input" placeholder="Ketik perintah atau pertanyaan..."
                           class="flex-1 bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500">
                    <button id="chat-send" class="bg-cyan-600 hover:bg-cyan-700 rounded-lg px-4 py-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                        </svg>
                    </button>
                </div>
                <button id="voice-btn" class="mt-3 bg-purple-600 hover:bg-purple-700 rounded-lg px-4 py-2 text-sm flex items-center justify-center space-x-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                    </svg>
                    <span>Voice Command</span>
                </button>
            </div>
        </aside>

        <!-- Main Content - Video Feed -->
        <main class="flex-1 bg-black relative">
            <div class="video-container">
                <img id="video-feed" src="/api/camera/stream" class="w-full h-full object-contain" alt="Camera Feed" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 640 480%22%3E%3Crect width=%22640%22 height=%22480%22 fill=%22%231e293b%22/%3E%3Ctext x=%22320%22 y=%22240%22 text-anchor=%22middle%22 fill=%22%2364748b%22 font-family=%22monospace%22%3ECamera Not Available%3C/text%3E%3C/svg%3E'">
            </div>
            
            <!-- Overlay HUD -->
            <div class="absolute top-4 left-4 right-4 pointer-events-none">
                <div class="bg-black/50 backdrop-blur-sm rounded-lg px-4 py-2 inline-block">
                    <div class="text-xs text-cyan-400 font-mono">LIVE STREAM</div>
                </div>
            </div>
            
            <!-- Recording Indicator -->
            <div class="absolute top-4 right-4">
                <div class="flex items-center space-x-2 bg-black/50 rounded-full px-3 py-1">
                    <div class="w-2 h-2 rounded-full bg-red-500 pulse"></div>
                    <span class="text-xs text-white">REC</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Socket.IO Connection
        const socket = io();
        
        // DOM Elements
        const btnUp = document.getElementById('btn-up');
        const btnDown = document.getElementById('btn-down');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnStop = document.getElementById('btn-stop');
        const chatInput = document.getElementById('chat-input');
        const chatSend = document.getElementById('chat-send');
        const chatMessages = document.getElementById('chat-messages');
        const voiceBtn = document.getElementById('voice-btn');
        
        // State
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        
        // Socket Events
        socket.on('connect', () => {
            console.log('Connected to server');
        });
        
        socket.on('sensor_update', (data) => {
            document.getElementById('sensor-cmd').textContent = data.command || 'STOP';
            document.getElementById('sensor-speed').textContent = `${(data.speed || 0).toFixed(2)} km/h`;
            document.getElementById('sensor-sat').textContent = data.satellites || 0;
            document.getElementById('sensor-lat').textContent = data.lat ? data.lat.toFixed(6) : '-';
            document.getElementById('sensor-lng').textContent = data.lng ? data.lng.toFixed(6) : '-';
        });
        
        socket.on('robot_status', (data) => {
            addChatMessage('system', `Robot: ${data.command}`, 'text-yellow-500');
        });
        
        socket.on('chat_response', (data) => {
            addChatMessage('bot', data.response);
        });
        
        // Control Functions
        function sendCommand(cmd) {
            fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: cmd })
            });
            socket.emit('command', { command: cmd });
        }
        
        // Button Events
        btnUp.addEventListener('click', () => sendCommand('maju'));
        btnDown.addEventListener('click', () => sendCommand('mundur'));
        btnLeft.addEventListener('click', () => sendCommand('kiri'));
        btnRight.addEventListener('click', () => sendCommand('kanan'));
        btnStop.addEventListener('click', () => sendCommand('stop'));
        
        // Keyboard Controls
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') sendCommand('maju');
            else if (key === 's') sendCommand('mundur');
            else if (key === 'a') sendCommand('kiri');
            else if (key === 'd') sendCommand('kanan');
            else if (key === 'x' || key === ' ') sendCommand('stop');
        });
        
        // Chat Functions
        function addChatMessage(sender, message, color = 'text-cyan-400') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-message ${color}`;
            const time = new Date().toLocaleTimeString();
            const senderName = sender === 'user' ? 'You' : (sender === 'bot' ? 'Gembot' : 'System');
            msgDiv.innerHTML = `<span class="text-xs text-slate-500">[${time}]</span> <strong>${senderName}:</strong> ${message}`;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            // Limit messages
            while (chatMessages.children.length > 50) {
                chatMessages.removeChild(chatMessages.firstChild);
            }
        }
        
        async function sendChatMessage() {
            const message = chatInput.value.trim();
            if (!message) return;
            
            addChatMessage('user', message, 'text-white');
            chatInput.value = '';
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                if (data.success) {
                    addChatMessage('bot', data.response);
                } else {
                    addChatMessage('bot', 'Maaf, terjadi kesalahan.', 'text-red-400');
                }
            } catch (error) {
                console.error('Chat error:', error);
                addChatMessage('bot', 'Maaf, terjadi kesalahan.', 'text-red-400');
            }
        }
        
        chatSend.addEventListener('click', sendChatMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });
        
        // Voice Recording
        voiceBtn.addEventListener('click', async () => {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };
                    
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        
                        addChatMessage('system', 'Memproses suara...', 'text-yellow-500');
                        
                        try {
                            const response = await fetch('/api/audio/upload', {
                                method: 'POST',
                                body: audioBlob
                            });
                            const data = await response.json();
                            if (data.success) {
                                addChatMessage('user', `🎤: ${data.text}`, 'text-white');
                                addChatMessage('bot', data.response);
                            } else {
                                addChatMessage('bot', 'Maaf, suara tidak dikenali.', 'text-red-400');
                            }
                        } catch (error) {
                            console.error('Voice error:', error);
                            addChatMessage('bot', 'Error processing voice.', 'text-red-400');
                        }
                        
                        stream.getTracks().forEach(track => track.stop());
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                    voiceBtn.classList.add('bg-red-600');
                    voiceBtn.classList.remove('bg-purple-600');
                    voiceBtn.querySelector('span').textContent = 'Recording...';
                    
                    // Auto stop after 5 seconds
                    setTimeout(() => {
                        if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
                            mediaRecorder.stop();
                            isRecording = false;
                            voiceBtn.classList.remove('bg-red-600');
                            voiceBtn.classList.add('bg-purple-600');
                            voiceBtn.querySelector('span').textContent = 'Voice Command';
                        }
                    }, 5000);
                    
                } catch (error) {
                    console.error('Microphone error:', error);
                    addChatMessage('bot', 'Akses mikrofon ditolak.', 'text-red-400');
                }
            } else {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                    isRecording = false;
                    voiceBtn.classList.remove('bg-red-600');
                    voiceBtn.classList.add('bg-purple-600');
                    voiceBtn.querySelector('span').textContent = 'Voice Command';
                }
            }
        });
        
        // Update Status
        async function updateStatus() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                
                const mqttDot = document.querySelector('#mqtt-status .w-2');
                const aiDot = document.querySelector('#ai-status .w-2');
                
                if (mqttDot) {
                    mqttDot.className = `w-2 h-2 rounded-full ${data.mqtt ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`;
                }
                if (aiDot) {
                    aiDot.className = `w-2 h-2 rounded-full ${data.ai ? 'bg-green-500 animate-pulse' : 'bg-yellow-500'}`;
                }
            } catch (error) {
                console.error('Status check failed:', error);
            }
        }
        
        // Periodic status update
        setInterval(updateStatus, 5000);
        updateStatus();
        
        // Initial welcome
        setTimeout(() => {
            addChatMessage('bot', 'Halo! Saya Gembot, asisten robot pintar Anda. Ada yang bisa saya bantu?');
        }, 1000);
        
        console.log('Gembot UI Ready!');
    </script>
</body>
</html>
EOF

echo "✅ UI telah diupdate!"
